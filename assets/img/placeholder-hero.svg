<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="center" cx="50%" cy="48%" r="65%">
      <stop offset="0%"   stop-color="#2d1060"/>
      <stop offset="55%"  stop-color="#180a38"/>
      <stop offset="100%" stop-color="#0a0514"/>
    </radialGradient>
    <radialGradient id="glow1" cx="35%" cy="30%" r="35%">
      <stop offset="0%"   stop-color="#b464ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b464ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="68%" cy="70%" r="30%">
      <stop offset="0%"   stop-color="#d4af37" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Fond principal -->
  <rect width="1920" height="1080" fill="url(#center)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>

  <!-- Bokeh mauve haut-gauche -->
  <circle cx="320" cy="200" r="180" fill="#7c3aed" opacity="0.06" filter="url(#blur1)"/>
  <circle cx="500" cy="120" r="80"  fill="#b464ff" opacity="0.08" filter="url(#blur2)"/>
  <circle cx="150" cy="400" r="120" fill="#5b21b6" opacity="0.07" filter="url(#blur1)"/>

  <!-- Bokeh or bas-droite -->
  <circle cx="1600" cy="850" r="200" fill="#d4af37" opacity="0.05" filter="url(#blur1)"/>
  <circle cx="1780" cy="700" r="90"  fill="#e8cc6e" opacity="0.06" filter="url(#blur2)"/>
  <circle cx="1400" cy="950" r="100" fill="#d4af37" opacity="0.04" filter="url(#blur1)"/>

  <!-- Bokeh mauve droite -->
  <circle cx="1750" cy="200" r="150" fill="#b464ff" opacity="0.05" filter="url(#blur1)"/>

  <!-- Bokeh bas-gauche -->
  <circle cx="200"  cy="900" r="120" fill="#7c3aed" opacity="0.05" filter="url(#blur1)"/>

  <!-- Particules dorées décoratives -->
  <g fill="#d4af37">
    <circle cx="400"  cy="150" r="2.5" opacity="0.4"/>
    <circle cx="560"  cy="280" r="1.8" opacity="0.3"/>
    <circle cx="250"  cy="600" r="2"   opacity="0.35"/>
    <circle cx="720"  cy="80"  r="1.5" opacity="0.25"/>
    <circle cx="1100" cy="120" r="2"   opacity="0.3"/>
    <circle cx="1450" cy="200" r="2.5" opacity="0.4"/>
    <circle cx="1680" cy="350" r="1.8" opacity="0.3"/>
    <circle cx="1820" cy="500" r="2"   opacity="0.25"/>
    <circle cx="1500" cy="650" r="1.5" opacity="0.3"/>
    <circle cx="1300" cy="900" r="2.5" opacity="0.35"/>
    <circle cx="800"  cy="950" r="2"   opacity="0.3"/>
    <circle cx="350"  cy="820" r="1.8" opacity="0.25"/>
    <circle cx="900"  cy="200" r="1.5" opacity="0.3"/>
    <circle cx="1650" cy="950" r="2"   opacity="0.35"/>
    <circle cx="100"  cy="300" r="2"   opacity="0.2"/>
  </g>

  <!-- Ligne décorative supérieure -->
  <line x1="760" y1="380" x2="1160" y2="380" stroke="#d4af37" stroke-width="0.8" opacity="0.2"/>
  <line x1="860" y1="700" x2="1060" y2="700" stroke="#d4af37" stroke-width="0.8" opacity="0.15"/>

  <!-- Petite décoration centre -->
  <g transform="translate(960, 540)" fill="none" stroke="#d4af37" opacity="0.12">
    <circle cx="0" cy="0" r="160" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="220" stroke-width="0.3"/>
  </g>

  <!-- Texte placeholder discret -->
  <text x="960" y="560"
    text-anchor="middle"
    fill="#d4af37"
    opacity="0.15"
    font-family="Georgia, serif"
    font-style="italic"
    font-size="28"
    letter-spacing="6">Remplacer par hero.mp4 ou hero.jpg</text>
</svg>
