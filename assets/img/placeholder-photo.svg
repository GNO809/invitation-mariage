<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fdf8ee"/>
      <stop offset="100%" stop-color="#f5f0e0"/>
    </linearGradient>
    <linearGradient id="gline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b8910a" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#b8910a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#b8910a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%"   stop-color="#d4af37" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond ivoire -->
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="400" fill="url(#glow)"/>

  <!-- Cadre double doré -->
  <rect x="10" y="10" width="380" height="380" rx="4"  fill="none" stroke="#b8910a" stroke-width="0.7" opacity="0.3"/>
  <rect x="18" y="18" width="364" height="364" rx="2"  fill="none" stroke="#b8910a" stroke-width="0.4" opacity="0.15"/>

  <!-- Coins décoratifs -->
  <g stroke="#b8910a" stroke-width="1.3" fill="none" opacity="0.55">
    <line x1="28" y1="42" x2="28" y2="28"/> <line x1="28" y1="28" x2="42" y2="28"/>
    <line x1="358" y1="42" x2="358" y2="28"/> <line x1="358" y1="28" x2="344" y2="28"/>
    <line x1="28" y1="358" x2="28" y2="372"/> <line x1="28" y1="372" x2="42" y2="372"/>
    <line x1="358" y1="358" x2="358" y2="372"/> <line x1="358" y1="372" x2="344" y2="372"/>
  </g>

  <!-- Icône appareil photo -->
  <g transform="translate(200, 175)" fill="none" stroke="#b8910a" stroke-linejoin="round" stroke-linecap="round" opacity="0.6">
    <rect x="-42" y="-26" width="84" height="62" rx="10" stroke-width="1.8"/>
    <rect x="-18" y="-35" width="36" height="10" rx="4" stroke-width="1.5"/>
    <circle cx="0" cy="8" r="24" stroke-width="1.5"/>
    <circle cx="0" cy="8" r="15" stroke-width="1"/>
    <circle cx="28" cy="-18" r="5.5" stroke-width="1.2"/>
    <line x1="28" y1="-14" x2="28" y2="-10" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Ligne décorative -->
  <line x1="80" y1="272" x2="320" y2="272" stroke="url(#gline)" stroke-width="0.8"/>

  <!-- Texte -->
  <text x="200" y="308"
    text-anchor="middle"
    fill="#b8910a"
    opacity="0.6"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="15"
    letter-spacing="3">Photo à venir</text>

  <!-- Points décoratifs -->
  <circle cx="172" cy="335" r="1.8" fill="#b8910a" opacity="0.25"/>
  <circle cx="200" cy="335" r="2.5" fill="#b8910a" opacity="0.35"/>
  <circle cx="228" cy="335" r="1.8" fill="#b8910a" opacity="0.25"/>
</svg>
