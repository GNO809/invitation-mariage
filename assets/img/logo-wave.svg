<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" role="img" aria-label="Wave">
  <defs>
    <linearGradient id="wbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fff8e7"/>
      <stop offset="100%" stop-color="#f5f0e0"/>
    </linearGradient>
    <linearGradient id="wgold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b8910a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>

  <!-- Fond ivoire arrondi -->
  <rect width="220" height="80" rx="14" fill="url(#wbg)"/>
  <!-- Bordure dorée -->
  <rect x="1" y="1" width="218" height="78" rx="13.5" fill="none" stroke="#d4af37" stroke-width="1.2" opacity="0.5"/>

  <!-- Symbole vague -->
  <g transform="translate(22, 20)">
    <path d="M0 20 Q10 7 20 20 Q30 33 40 20 Q50 7 60 20"
          fill="none" stroke="url(#wgold)" stroke-width="3.5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M8 31 Q18 22 28 31 Q38 40 48 31"
          fill="none" stroke="#d4af37" stroke-width="2"
          stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Texte "Wave" -->
  <text x="104" y="49"
    fill="url(#wgold)"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-weight="700"
    font-size="26"
    letter-spacing="-0.5">Wave</text>
</svg>
